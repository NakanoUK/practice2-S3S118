    <h2>阿波おどりとは</h2>

    <img src="awaodori.jpg" alt="阿波おどり">

    <p>
        阿波おどりは徳島県で毎年8月に開催される
        日本最大級の伝統芸能です。
        起源は1500年代後半にさかのぼるとされ、
        多くの踊り手が「連」と呼ばれる
        グループを組んで街中を踊り歩きます。
    </p>

<h2>特徴</h2>

<ul>
    <li>400年以上の歴史を持つ</li>
    <li>毎年8月12日～15日に開催</li>
    <li>国内外から多くの観光客が訪れる</li>
    <li>踊る阿呆に見る阿呆の掛け声で有名</li>
</ul>
